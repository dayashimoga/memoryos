
# ─── Shared build args ────────────────────────────────────────────────────────
x-rust-env: &rust-env
  RUST_LOG: debug
  RUST_BACKTRACE: 1
  CARGO_HOME: /usr/local/cargo
  CARGO_INCREMENTAL: "1"

x-rust-volumes: &rust-volumes
  - .:/workspace
  - cargo-cache:/usr/local/cargo/registry
  - cargo-git:/usr/local/cargo/git
  - target-cache:/workspace/target

services:
  # ─── Rust Build ─────────────────────────────────────────────────────────────
  rust-build:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes: *rust-volumes
    environment: *rust-env
    working_dir: /workspace
    command: cargo build --workspace --release
    networks:
      - memoryos

  # ─── Rust Build (Windows cross-compilation) ─────────────────────────────────
  rust-build-windows:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes: *rust-volumes
    environment: *rust-env
    working_dir: /workspace
    command: cargo build --workspace --release --target x86_64-pc-windows-gnu
    networks:
      - memoryos

  # ─── Rust Check (fast lint/typecheck) ───────────────────────────────────────
  rust-check:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes: *rust-volumes
    environment: *rust-env
    working_dir: /workspace
    command: >
      bash -c "
        cargo fmt --all -- --check &&
        cargo clippy --all-targets --all-features -- -D warnings &&
        cargo check --workspace
      "
    networks:
      - memoryos

  # ─── Rust Test ──────────────────────────────────────────────────────────────
  rust-test:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes: *rust-volumes
    environment: *rust-env
    working_dir: /workspace
    command: cargo test --workspace --all-features -- --test-threads=4
    networks:
      - memoryos

  # ─── Rust Coverage ──────────────────────────────────────────────────────────
  rust-coverage:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes: *rust-volumes
    environment:
      <<: *rust-env
      RUSTFLAGS: -C instrument-coverage
    working_dir: /workspace
    command: >
      bash -c "
        cargo install cargo-tarpaulin --locked 2>/dev/null || true &&
        cargo tarpaulin --workspace --out Xml --output-dir /workspace/coverage/ &&
        echo '=== Coverage Report ===' &&
        cargo tarpaulin --workspace --print-summary
      "
    networks:
      - memoryos

  # ─── Interactive dev shell ───────────────────────────────────────────────────
  builder:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes: *rust-volumes
    environment: *rust-env
    working_dir: /workspace
    command: sleep infinity
    stdin_open: true
    tty: true
    networks:
      - memoryos

  # ─── Flutter Analyze ────────────────────────────────────────────────────────
  flutter-analyze:
    build:
      context: .
      dockerfile: docker/flutter/Dockerfile
    image: memoryos-flutter:latest
    volumes:
      - ./apps/flutter_app:/flutter_app
      - flutter-pub-cache:/root/.pub-cache
    working_dir: /flutter_app
    command: >
      bash -c "
        flutter pub get &&
        dart format --set-exit-if-changed . &&
        flutter analyze
      "
    networks:
      - memoryos

  # ─── Flutter Test ───────────────────────────────────────────────────────────
  flutter-test:
    build:
      context: .
      dockerfile: docker/flutter/Dockerfile
    image: memoryos-flutter:latest
    volumes:
      - ./apps/flutter_app:/flutter_app
      - flutter-pub-cache:/root/.pub-cache
    working_dir: /flutter_app
    command: >
      bash -c "
        flutter pub get &&
        flutter test --coverage --reporter=expanded &&
        echo '=== Coverage gate ===' &&
        LINES_HIT=$$(grep -oP 'LH:\K\d+' coverage/lcov.info 2>/dev/null | awk '{s+=$$1}END{print s+0}') &&
        LINES_FOUND=$$(grep -oP 'LF:\K\d+' coverage/lcov.info 2>/dev/null | awk '{s+=$$1}END{print s+0}') &&
        python3 -c \"
hit=int('$${LINES_HIT:-0}')
found=int('$${LINES_FOUND:-0}')
if found > 0:
    pct = hit * 100.0 / found
    print(f'Flutter coverage: {pct:.1f}% ({hit}/{found} lines)')
    import sys
    if pct < 65.0:
        print(f'FAIL: coverage {pct:.1f}% is below 65% threshold')
        sys.exit(1)
    print('PASS: coverage meets 65% threshold')
else:
    print('No coverage data — skipping gate')
\"
      "
    networks:
      - memoryos

  # ─── Flutter Web Dev Server ──────────────────────────────────────────────────
  flutter-web:
    build:
      context: .
      dockerfile: docker/flutter/Dockerfile
    image: memoryos-flutter:latest
    ports:
      - "3000:3000"
    volumes:
      - ./apps/flutter_app:/flutter_app
      - flutter-pub-cache:/root/.pub-cache
    working_dir: /flutter_app
    command: >
      bash -c "
        flutter pub get &&
        flutter run -d web-server --web-port 3000 --web-hostname 0.0.0.0 --web-renderer html
      "
    networks:
      - memoryos

  # ─── Flutter Web Build (production) ─────────────────────────────────────────
  flutter-build-web:
    build:
      context: .
      dockerfile: docker/flutter/Dockerfile
    image: memoryos-flutter:latest
    volumes:
      - ./apps/flutter_app:/flutter_app
      - flutter-pub-cache:/root/.pub-cache
    working_dir: /flutter_app
    command: >
      bash -c "
        flutter pub get &&
        flutter build web --release &&
        echo 'Build complete: apps/flutter_app/build/web/'
      "
    networks:
      - memoryos

  # ─── Flutter Linux Build ─────────────────────────────────────────────────────
  flutter-build-linux:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes:
      - .:/workspace
      - flutter-pub-cache:/root/.pub-cache
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/workspace/target
    environment: *rust-env
    working_dir: /workspace
    command: >
      bash -c "
        echo '[Build] Compiling Rust core-engine for Linux...' &&
        cargo build --workspace --release &&
        echo '[Build] Building Flutter Linux app...' &&
        cd apps/flutter_app &&
        flutter config --enable-linux-desktop &&
        flutter pub get &&
        flutter build linux --release &&
        echo '[Build] Copying Rust .so into Flutter bundle...' &&
        mkdir -p build/linux/x64/release/bundle/lib &&
        cp /workspace/target/release/libcore_engine.so build/linux/x64/release/bundle/lib/ &&
        echo '[OK] Linux build complete:' &&
        ls -lh build/linux/x64/release/bundle/
      "
    networks:
      - memoryos

  # ─── Flutter Android Build (production) ──────────────────────────────────────
  flutter-build-android:
    build:
      context: .
      dockerfile: docker/android/Dockerfile
    image: memoryos-android:latest
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/workspace/target
      - flutter-pub-cache:/root/.pub-cache
    working_dir: /workspace
    command: >
      bash -c "
        echo '[Build] Compiling Rust core-engine for all Android ABI targets...' &&
        cargo ndk \
          --platform 23 \
          --target aarch64-linux-android \
          --target armv7-linux-androideabi \
          --target x86_64-linux-android \
          --target i686-linux-android \
          -o apps/flutter_app/android/app/src/main/jniLibs \
          build --release -p core-engine &&
        echo '[Build] jniLibs contents:' &&
        find apps/flutter_app/android/app/src/main/jniLibs -name '*.so' &&
        echo '[Build] Building Flutter Android APK...' &&
        cd apps/flutter_app &&
        flutter pub get &&
        flutter build apk --release &&
        flutter build appbundle --release &&
        mkdir -p /workspace/artifacts/android &&
        cp build/app/outputs/flutter-apk/app-release.apk /workspace/artifacts/android/memoryos-release.apk &&
        cp build/app/outputs/bundle/release/app-release.aab /workspace/artifacts/android/memoryos-release.aab &&
        echo '[OK] Android build complete:' &&
        ls -lh /workspace/artifacts/android/
      "
    networks:
      - memoryos

  # ─── Flutter Windows DLL Build (cross-compilation via Docker) ────────────────
  # NOTE: This service cross-compiles ONLY the Rust core_engine.dll for Windows.
  # The Flutter Windows .exe must be built on a Windows host machine (see build_docker.ps1).
  # Docker cannot run flutter build windows --release on Linux (requires MSVC).
  flutter-build-windows-dll:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/workspace/target
    environment:
      <<: *rust-env
      CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
    working_dir: /workspace
    command: >
      bash -c "
        echo '[Build] Cross-compiling Rust core-engine.dll for Windows (x86_64-pc-windows-gnu)...' &&
        cargo build --workspace --release --target x86_64-pc-windows-gnu &&
        mkdir -p /workspace/artifacts/windows &&
        cp target/x86_64-pc-windows-gnu/release/core_engine.dll /workspace/artifacts/windows/ 2>/dev/null || \
        find target/x86_64-pc-windows-gnu/release -name '*.dll' -exec cp {} /workspace/artifacts/windows/ \; &&
        echo '[OK] Windows DLL build complete:' &&
        ls -lh /workspace/artifacts/windows/
      "
    networks:
      - memoryos

  # ─── Security Scan ──────────────────────────────────────────────────────────
  security:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes: *rust-volumes
    working_dir: /workspace
    command: >
      bash -c "
        cargo install cargo-audit --locked 2>/dev/null || true &&
        cargo audit
      "
    networks:
      - memoryos

  # ─── Documentation Server ────────────────────────────────────────────────────
  docs:
    build:
      context: .
      dockerfile: docker/docs/Dockerfile
    image: memoryos-docs:latest
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/docs
      - ./mkdocs.yml:/mkdocs.yml
    command: mkdocs serve --dev-addr=0.0.0.0:8000
    networks:
      - memoryos

  # ─── Tester (combined Rust + Flutter) ───────────────────────────────────────
  tester:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: memoryos-builder:latest
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/workspace/target
      - flutter-pub-cache:/root/.pub-cache
    environment: *rust-env
    working_dir: /workspace
    command: >
      bash -c "
        echo '=== Rust Tests ===' &&
        cargo test --workspace --all-features -- --test-threads=4 &&
        echo '=== Flutter Tests ===' &&
        cd apps/flutter_app &&
        flutter pub get &&
        flutter test --coverage --reporter=compact
      "
    networks:
      - memoryos

networks:
  memoryos:
    driver: bridge

volumes:
  cargo-cache:
  cargo-git:
  target-cache:
  flutter-pub-cache:

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.memoryos"
    compileSdk 35
    // Pin NDK version to match docker/android/Dockerfile (ndk;27.0.12077973)
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.example.memoryos"
        minSdk 23
        targetSdk 35
        versionCode flutter.versionCode
        versionName flutter.versionName

        // Include all ABI targets that cargo-ndk produces so the
        // Rust libcore_engine.so is packaged into the APK for every architecture.
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64", "x86"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

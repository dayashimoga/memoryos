name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.19.0"

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: generate_notes
        run: |
          VERSION=${GITHUB_REF_NAME}
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$VERSION" | head -1)
          echo "## Changes in $VERSION" > release_notes.md
          git log --oneline "$PREV_TAG..HEAD" | head -50 >> release_notes.md

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: MemoryOS ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ─── Windows Build ───────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: cargo build --workspace --release
      - run: flutter pub get
        working-directory: apps/flutter_app
      - run: flutter build windows --release
        working-directory: apps/flutter_app
      - name: Package Windows artifact
        run: |
          Compress-Archive -Path "apps/flutter_app/build/windows/x64/runner/Release/*" -DestinationPath "memoryos-windows.zip"
        shell: powershell
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: memoryos-windows.zip
          asset_name: memoryos-${{ github.ref_name }}-windows.zip
          asset_content_type: application/zip

  # ─── macOS Build ─────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: cargo build --workspace --release
      - run: flutter pub get
        working-directory: apps/flutter_app
      - run: flutter build macos --release
        working-directory: apps/flutter_app
      - name: Create DMG
        run: |
          hdiutil create -volname "MemoryOS" -srcfolder "apps/flutter_app/build/macos/Build/Products/Release/memoryos.app" \
            -ov -format UDZO memoryos-macos.dmg
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: memoryos-macos.dmg
          asset_name: memoryos-${{ github.ref_name }}-macos.dmg
          asset_content_type: application/octet-stream

  # ─── Linux Build ─────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: sudo apt-get install -y ninja-build libgtk-3-dev
      - run: cargo build --workspace --release
      - run: flutter pub get
        working-directory: apps/flutter_app
      - run: flutter build linux --release
        working-directory: apps/flutter_app
      - name: Package Linux artifact
        run: tar -czf memoryos-linux.tar.gz -C apps/flutter_app/build/linux/x64/release/bundle .
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: memoryos-linux.tar.gz
          asset_name: memoryos-${{ github.ref_name }}-linux.tar.gz
          asset_content_type: application/gzip

  # ─── Android Build ───────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
        working-directory: apps/flutter_app
      - run: flutter build apk --release
        working-directory: apps/flutter_app
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          asset_name: memoryos-${{ github.ref_name }}-android.apk
          asset_content_type: application/vnd.android.package-archive

  # ─── SBOM Generation ─────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate CycloneDX SBOM
        run: syft . -o cyclonedx-json > sbom.cdx.json
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: sbom.cdx.json
          asset_name: memoryos-${{ github.ref_name }}-sbom.cdx.json
          asset_content_type: application/json

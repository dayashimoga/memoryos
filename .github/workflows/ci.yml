name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FLUTTER_VERSION: "3.24.3"

jobs:
  # ─── Rust Tests ─────────────────────────────────────────────────────────────
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: cargo test (release)
        run: cargo test --workspace --release

  # ─── Rust Coverage ──────────────────────────────────────────────────────────
  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate coverage report
        run: cargo tarpaulin --workspace --out Xml --output-dir coverage/ 2>&1 | tee tarpaulin_output.log

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/cobertura.xml
          fail_ci_if_error: false

      - name: Coverage gate (≥ 35%)
        run: |
          COVERAGE=$(grep -oP '\d+\.\d+(?=%)' tarpaulin_output.log | tail -1)
          echo "Coverage: ${COVERAGE}%"
          python3 -c "
          import sys
          cov = float('${COVERAGE}')
          print(f'Coverage: {cov:.1f}%')
          if cov < 35.0:
              print(f'FAIL: Coverage {cov:.1f}% is below the 35% threshold')
              sys.exit(1)
          else:
              print(f'PASS: Coverage {cov:.1f}% meets the 35% threshold')
          "

  # ─── Flutter Tests ──────────────────────────────────────────────────────────
  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: apps/flutter_app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/flutter_app
        run: flutter analyze

      - name: Flutter format check
        working-directory: apps/flutter_app
        run: dart format --set-exit-if-changed .

      - name: Flutter test
        working-directory: apps/flutter_app
        run: flutter test --coverage

      - name: Flutter coverage gate (≥ 65%)
        working-directory: apps/flutter_app
        run: |
          pip install lcov-cobertura 2>/dev/null || true
          LINES_HIT=$(grep -oP 'LH:\K\d+' coverage/lcov.info | awk '{s+=$1}END{print s}')
          LINES_FOUND=$(grep -oP 'LF:\K\d+' coverage/lcov.info | awk '{s+=$1}END{print s}')
          if [ "$LINES_FOUND" -gt 0 ]; then
            COVERAGE=$(echo "scale=2; $LINES_HIT * 100 / $LINES_FOUND" | bc)
            echo "Flutter Coverage: ${COVERAGE}%"
            python3 -c "
          cov = float('${COVERAGE}')
          print(f'Coverage: {cov:.1f}%')
          import sys
          if cov < 65.0:
              print(f'FAIL: Coverage {cov:.1f}% is below 65% threshold')
              sys.exit(1)
          print(f'PASS: Coverage {cov:.1f}% meets threshold')
          "
          else
            echo "No coverage data found — skipping gate"
          fi

      - name: Upload Flutter coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/flutter_app/coverage/lcov.info
          fail_ci_if_error: false

  # ─── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo-audit
        run: cargo audit

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  # ─── Build Matrix ───────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [rust-test, flutter-test]
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Clean VS 2019 leftovers for Windows target
        if: matrix.target == 'windows'
        run: |
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft Visual Studio\2019" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft Visual Studio\2019" -ErrorAction SilentlyContinue
        shell: powershell

      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev mingw-w64

      - name: Enable Windows desktop support
        if: matrix.target == 'windows'
        run: flutter config --enable-windows-desktop

      - name: Bootstrap Flutter platforms
        working-directory: apps/flutter_app
        run: |
          flutter clean
          flutter create --platforms=${{ matrix.target }} .

      - name: Flutter pub get
        working-directory: apps/flutter_app
        run: flutter pub get

      - name: Build Rust crates (Linux/Windows Native)
        run: cargo build --workspace --release

      - name: Build Rust crates (Windows DLL via Docker)
        if: matrix.target == 'linux'
        run: docker compose run --rm rust-build-windows

      - name: Build Flutter (Linux)
        if: matrix.target == 'linux'
        working-directory: apps/flutter_app
        run: flutter build linux --release

      - name: Copy Linux Rust SO to Flutter output
        if: matrix.target == 'linux'
        run: |
          mkdir -p apps/flutter_app/build/linux/x64/release/bundle/lib
          cp target/release/libcore_engine.so apps/flutter_app/build/linux/x64/release/bundle/lib/

      - name: Build Flutter (Windows)
        if: matrix.target == 'windows'
        working-directory: apps/flutter_app
        run: flutter build windows --release

      - name: Copy Windows Rust DLL to Flutter output
        if: matrix.target == 'windows'
        run: |
          New-Item -ItemType Directory -Force -Path "apps/flutter_app/build/windows/x64/runner/Release"
          Copy-Item -Path "target/release/core_engine.dll" -Destination "apps/flutter_app/build/windows/x64/runner/Release/" -Force
        shell: powershell

      - name: Build Flutter (macOS)
        if: matrix.target == 'macos'
        working-directory: apps/flutter_app
        run: flutter build macos --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: memoryos-${{ matrix.target }}
          path: |
            apps/flutter_app/build/linux/x64/release/bundle/
            apps/flutter_app/build/windows/x64/runner/Release/
            apps/flutter_app/build/macos/Build/Products/Release/
            target/x86_64-pc-windows-gnu/release/*.dll
          if-no-files-found: warn

  # ─── Mobile Build Pipeline ──────────────────────────────────────────────────
  build-mobile-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    needs: [rust-test, flutter-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust core-engine for Android
        run: cargo ndk --target aarch64-linux-android --target armv7-linux-androideabi -o apps/flutter_app/android/app/src/main/jniLibs build --release

      - name: Bootstrap Flutter Android
        working-directory: apps/flutter_app
        run: flutter create --platforms=android .

      - name: Flutter pub get
        working-directory: apps/flutter_app
        run: flutter pub get

      - name: Build Android APK
        working-directory: apps/flutter_app
        run: flutter build apk --release

      - name: Build Android App Bundle
        working-directory: apps/flutter_app
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memoryos-android
          path: |
            apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
            apps/flutter_app/build/app/outputs/bundle/release/app-release.aab

  build-mobile-ios:
    name: Build iOS (IPA)
    runs-on: macos-latest
    needs: [rust-test, flutter-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Bootstrap Flutter iOS
        working-directory: apps/flutter_app
        run: flutter create --platforms=ios .

      - name: Flutter pub get
        working-directory: apps/flutter_app
        run: flutter pub get

      - name: Build iOS App
        working-directory: apps/flutter_app
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memoryos-ios
          path: |
            apps/flutter_app/build/ios/iphoneos/Runner.app

  # ─── Release Quality Reports ────────────────────────────────────────────────
  release-engineering:
    name: Release Engineering & Validation Audit
    runs-on: ubuntu-latest
    needs: [rust-test, flutter-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate Reports
        run: python3 scripts/verify_readiness.py

      - name: Upload Validation Reports
        uses: actions/upload-artifact@v4
        with:
          name: memoryos-release-reports
          path: artifacts/reports/

